<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f4f6f8;
            color: #555;
            flex-direction: column;
        }

        .loader-cubes-wrap {
            display: flex;
            gap: 12px;
        }

        .loader-cube {
            width: calc(120px/3);
            height: calc(120px/3);
            border-radius: 8px;
            animation: bounce-cube 1.50s cubic-bezier(0.28, 0.84, 0.42, 1) infinite;
        }

        .loader-cube.one {
            background: #ff0055;
            animation-delay: 0s;
        }

        .loader-cube.two {
            background: #00eeff;
            animation-delay: 0.15s;
        }

        .loader-cube.three {
            background: #ffaa00;
            animation-delay: 0.3s;
        }

        @keyframes bounce-cube {

            0%,
            100% {
                transform: translateY(0) scaleY(1) rotate(0);
            }

            30% {
                transform: translateY(calc(120px * -0.8)) scaleY(1.1) rotate(45deg);
            }

            60% {
                transform: translateY(calc(120px * -0.1)) scaleY(0.9) rotate(90deg);
            }
        }

        #message {
            text-align: center;
            max-width: 80%;
        }

        .config-error {
            color: #d9534f;
            background: #f9f2f4;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #d9534f;
        }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-T1S5VW5N9W"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-T1S5VW5N9W');
    </script>
</head>

<body>

    <div class="loader-cubes-wrap">
        <div class="loader-cube one"></div>
        <div class="loader-cube two"></div>
        <div class="loader-cube three"></div>
    </div>
    <div id="message">กำลังไป...</div>

    <script>
        // ==========================================
        // CONFIGURATION SECTION - EDIT THIS!
        // ==========================================
        const CONFIG = {
            // Paste your Google Apps Script Web App URL here
            // Example: "https://script.google.com/macros/s/AKfycby.../exec"
            WEB_APP_URL: "https://script.google.com/macros/s/AKfycbygcvjOD3FDGHUGQAg0uHSmpS7miE39u3kSdLL_Pz_CiRv5EsAmZi6bP5w5E1MzbNVz/exec"
        };
        // ==========================================

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const msgEl = document.getElementById('message');
            const loaderEl = document.querySelector('.loader-cubes-wrap');

            if (!CONFIG.WEB_APP_URL) {
                loaderEl.style.display = 'none';
                msgEl.innerHTML = `<div class='config-error'>
                    <strong>System Not Configured</strong><br>
                    Please edit <code>index.html</code> and set the <code>WEB_APP_URL</code> variable.
                </div>`;
                return;
            }

            if (!id) {
                // If no ID is present, and we are not on admin page, maybe show a 404 or admin link
                // For now, just say Link Not Found
                loaderEl.style.display = 'none';
                msgEl.textContent = "Link ID not found.";
                return;
            }

            // Gather Metadata
            const meta = {
                userAgent: navigator.userAgent,
                screen: `${window.screen.width}x${window.screen.height}`,
                referrer: document.referrer,
                language: navigator.language,
                time: new Date().toISOString()
            };

            try {
                // Determine connector (params separator) for GAS URL
                // usually GAS URLs end in /exec. we append ?action=log...
                const fetchUrl = `${CONFIG.WEB_APP_URL}?action=log&id=${id}&meta=${encodeURIComponent(JSON.stringify(meta))}`;

                const response = await fetch(fetchUrl);
                const data = await response.json();

                if (data.status === "success" && data.targetUrl) {
                    msgEl.textContent = "รอสักครู่...";
                    window.location.href = data.targetUrl;
                } else {
                    throw new Error(data.message || "Unknown error");
                }
            } catch (err) {
                loaderEl.style.display = 'none';
                console.error(err);
                msgEl.textContent = "Error: " + err.message;
            }
        }

        init();
    </script>
</body>

</html>
