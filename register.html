<body class="flex items-center justify-center min-h-screen">
    <div class="container mx-auto">
        <!-- Header -->
        <div class="text-black text-center py-5">
            <h1 class="text-2xl ">ลงทะเบียนสมาชิก</h1>
        </div>

        <!-- Profile Section -->
        <div class="profile-section">
            <div class="flex items-center">
                <img id="profileImage" src="https://cdn.pixabay.com/animation/2022/11/04/09/42/09-42-03-510_512.gif" alt="Profile" class="w-16 h-16 rounded-full mr-4">
                <div>
                    <h4 id="displayName" class="text-lg  text-gray-800">Loading...</h4>
                    <p id="statusMessage" class="text-gray-500 text-sm">Loading status...</p>
                    <span id="userStatus" class="status-badge inline-block px-2 py-1 text-sm  text-white bg-green-500 rounded-full">Online</span>
                </div>
            </div>
            <div id="timeDisplay" class="time-display">
                00:00:00
            </div>
        </div>

        <!-- Registration Form -->
        <div class="p-4">
            <form id="registrationForm">
                <div class="mb-4">
                    <label for="firstName" class="block text-gray-700 text-sm  mb-2">ชื่อ</label>
                    <input type="text" id="firstName" name="firstName" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
                </div>
                <div class="mb-4">
                    <label for="lastName" class="block text-gray-700 text-sm  mb-2">นามสกุล</label>
                    <input type="text" id="lastName" name="lastName" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
                </div>
                <div class="mb-4">
                    <label for="position" class="block text-gray-700 text-sm  mb-2">ปฏิบัติหน้าที่เป็น</label>
                      <select name="position" id="position" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
                        <option value="FCG" selected>ผู้ดูแลในครอบครัว</option>
                        <option value="CG">CG</option>
                        <option value="CM">CM</option>
                        <option value="CCO">C-Co</option>
                      </select>
                </div>
                <div class="mb-4">
                    <label for="department" class="block text-gray-700 text-sm mb-2">ขึ้นตรงหน่วยงาน(ชื่อ) </label>
                    <input type="text" id="department" name="department" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
                </div>
                <div class="flex items-center justify-center">
                    <button type="submit" id="bt_custom" class="hover:bg-green-700 py-2 px-4  focus:outline-none focus:shadow-outline">ลงทะเบียน</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <script>
        let userId = '';

        function changeDepartment() {
            const positionSelect = document.getElementById('position');
            const departmentInput = document.getElementById('department');
            
            // ถ้าเลือก FCG ให้ disable และใส่ค่า default
            if (positionSelect.value === 'FCG') {
                departmentInput.value = 'ผู้ดูแลในครอบครัว';
                departmentInput.disabled = true;
            } else {
                departmentInput.value = '';
                departmentInput.disabled = false;
            }
        }
        
        // เรียกใช้เมื่อเปลี่ยนค่า select
        document.getElementById('position').addEventListener('change', changeDepartment);
        
        // ตั้งค่าเริ่มต้น
        changeDepartment();
      
    const liffId = '2006670422-W8z1J0rl'; // เปลี่ยนจุดที่ 1 liff register

        
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('timeDisplay').textContent = `${hours}:${minutes}:${seconds}`;
        }

        setInterval(updateTime, 1000);
        updateTime(); 

       
        function showLoading() {
            document.getElementById('loadingOverlay').style.display = 'flex';
        }

      
        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        
        async function initializeLiff() {
            try {
                await liff.init({ liffId: liffId });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    document.getElementById('displayName').textContent = profile.displayName;
                    document.getElementById('statusMessage').textContent = profile.statusMessage;
                    document.getElementById('profileImage').src = profile.pictureUrl;
                    document.getElementById('userStatus').textContent = liff.isLoggedIn() ? 'Online' : 'Offline';
                } else {
                    liff.login();
                }
            } catch (error) {
                console.error('LIFF initialization error:', error);
            }
        }

        initializeLiff();

        
        async function sendToGoogleSheet(userId, firstName, lastName, position, department) {
            try {
                const response = await fetch('https://script.google.com/macros/s/AKfycbzEra2WSYdWw3NSxgItCcl5BWEIs41ZajR6lPYLx5GqVu0e6l-GGV-z6Eu6fdTseMVt/exec', {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({
                        userId: userId,
                        firstName: firstName,
                        lastName: lastName,
                        position: position,
                        department: department,
                    })
                });

                // no-cors mode doesn't return readable response, but we assume success
                console.log('Data sent to Google Sheets');
            } catch (error) {
                console.error('Error sending data to Google Sheets:', error);
                throw error;
            }
        }

      
        document.getElementById('registrationForm').addEventListener('submit', async function(event) {
            event.preventDefault();

            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const position = document.getElementById('position').value;
            const department = document.getElementById('department').value.trim();

            // Validate required fields
            if (!firstName || !lastName || !department) {
                Swal.fire({
                    icon: 'warning',
                    title: 'กรุณากรอกข้อมูลให้ครบถ้วน',
                    confirmButtonText: 'ตกลง',
                    confirmButtonColor: '#90EE90'
                });
                return;
            }

            // Get user ID from LIFF
            const idToken = liff.getDecodedIDToken();
            if (!idToken || !idToken.sub) {
                Swal.fire({
                    icon: 'error',
                    title: 'ข้อผิดพลาด',
                    text: 'ไม่พบข้อมูลผู้ใช้ กรุณาลองใหม่อีกครั้ง',
                    confirmButtonText: 'ตกลง',
                    confirmButtonColor: '#90EE90'
                });
                return;
            }

            userId = idToken.sub;
            const profileImage = document.getElementById('profileImage').src;

            showLoading();

            try {
                await sendToGoogleSheet(userId, firstName, lastName, position, department);
                
                // Send Flex Message
                await sendFlexMessage('Register');
                
                Swal.fire({
                    icon: 'success',
                    title: 'ลงทะเบียนสำเร็จ!',
                    text: 'ผลการลงทะเบียนได้ถูกส่งไปยังแชทแล้ว',
                    confirmButtonText: 'ตกลง',
                    confirmButtonColor: '#90EE90'
                }).then(() => {
                    document.getElementById('registrationForm').reset();
                    changeDepartment(); // Reset department field
                });
            } catch (error) {
                console.error('Error:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'เกิดข้อผิดพลาด',
                    text: 'ไม่สามารถลงทะเบียนได้ กรุณาลองใหม่อีกครั้ง',
                    confirmButtonText: 'ตกลง',
                    confirmButtonColor: '#90EE90'
                });
            } finally {
                hideLoading();
            }
        });

        async function sendFlexMessage(type) {
            const now = new Date();
            const time = now.toLocaleTimeString('en-GB', { hour12: false });
            const date = now.toLocaleDateString('th-TH');

            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const position = document.getElementById('position').value;
            const department = document.getElementById('department').value;
            const profile = await liff.getProfile();
            
            // Position-based color and icon
            let positionColor = '#4CAF50';
            let positionIcon = '🎉';
            if (position === 'FCG') {
                positionColor = '#FF6B6B';
                positionIcon = '🏠';
            } else if (position === 'CG') {
                positionColor = '#4ECDC4';
                positionIcon = '👨‍⚕️';
            } else if (position === 'CM') {
                positionColor = '#45B7D1';
                positionIcon = '📋';
            } else if (position === 'CCO') {
                positionColor = '#96CEB4';
                positionIcon = '👔';
            }

            const message = {
                type: 'flex',
                altText: `ลงทะเบียนสำเร็จเมื่อ ${time}`,
                contents: {
                    "type": "bubble",
                    "theme": "success",
                    "header": {
                        "type": "box",
                        "layout": "vertical",
                        "contents": [
                            {
                                "type": "text",
                                "text": "✅ ลงทะเบียนสำเร็จ",
                                "weight": "bold",
                                "size": "lg",
                                "color": "#ffffff",
                                "align": "center",
                                "margin": "md"
                            }
                        ],
                        "backgroundColor": "#4CAF50",
                        "paddingAll": "12px"
                    },
                    "body": {
                        "type": "box",
                        "layout": "vertical",
                        "contents": [
                            {
                                "type": "box",
                                "layout": "horizontal",
                                "contents": [
                                    {
                                        "type": "box",
                                        "layout": "vertical",
                                        "contents": [
                                            {
                                                "type": "image",
                                                "url": profile.pictureUrl || "https://i.pinimg.com/originals/be/04/0f/be040f35f073adc3a48c1fba489d2bc4.gif",
                                                "aspectMode": "cover",
                                                "size": "full",
                                                "cornerRadius": "20px"
                                            }
                                        ],
                                        "width": "80px",
                                        "height": "80px",
                                        "cornerRadius": "20px"
                                    },
                                    {
                                        "type": "box",
                                        "layout": "vertical",
                                        "contents": [
                                            {
                                                "type": "text",
                                                "text": `${firstName} ${lastName}`,
                                                "weight": "bold",
                                                "size": "lg",
                                                "color": "#1a1a2e",
                                                "wrap": false
                                            },
                                            {
                                                "type": "text",
                                                "text": `ตำแหน่ง: ${positionIcon} ${position}`,
                                                "size": "sm",
                                                "color": positionColor,
                                                "weight": "bold",
                                                "margin": "sm",
                                                "wrap": false
                                            },
                                            {
                                                "type": "text",
                                                "text": `หน่วยงาน: ${department}`,
                                                "size": "sm",
                                                "color": "#666666",
                                                "margin": "sm",
                                                "wrap": true
                                            }
                                        ],
                                        "spacing": "sm",
                                        "justifyContent": "center"
                                    }
                                ],
                                "spacing": "md",
                                "paddingAll": "md",
                                "backgroundColor": "#f8f9fa",
                                "cornerRadius": "12px",
                                "margin": "md"
                            },
                            {
                                "type": "separator",
                                "margin": "lg"
                            },
                            {
                                "type": "box",
                                "layout": "horizontal",
                                "contents": [
                                    {
                                        "type": "text",
                                        "text": "📅",
                                        "size": "md",
                                        "flex": 0
                                    },
                                    {
                                        "type": "text",
                                        "text": date,
                                        "size": "sm",
                                        "color": "#666666",
                                        "margin": "sm",
                                        "flex": 1
                                    },
                                    {
                                        "type": "text",
                                        "text": "🕐",
                                        "size": "md",
                                        "flex": 0
                                    },
                                    {
                                        "type": "text",
                                        "text": time,
                                        "size": "sm",
                                        "color": "#666666",
                                        "margin": "sm",
                                        "flex": 1
                                    }
                                ],
                                "paddingAll": "sm",
                                "backgroundColor": "#e8f5e9",
                                "cornerRadius": "8px",
                                "margin": "md"
                            }
                        ],
                        "paddingAll": "md"
                    },
                    "footer": {
                        "type": "box",
                        "layout": "vertical",
                        "contents": [
                            {
                                "type": "text",
                                "text": "ขอบคุณที่ลงทะเบียน 🙏",
                                "size": "sm",
                                "color": "#888888",
                                "align": "center",
                                "margin": "md"
                            }
                        ],
                        "paddingAll": "sm"
                    },
                    "styles": {
                        "header": {
                            "separator": true
                        }
                    }
                }
            };

            try {
                await liff.sendMessages([message]);
                liff.closeWindow(); 
            } catch (error) {
                console.error('Error sending message:', error);
            }
        }
  
  
    </script>
   
</body>
